const HEAD_POLY = [
  [431,633],[495,644],[541,675],[593,734],[624,799],[641,859],[649,887],
  [670,911],[688,941],[684,977],[659,999],
  [647,1021],[622,1079],[590,1136],[549,1177],[516,1184],[484,1177],

// ===== 캔버스 =====
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let scale = 1, W = 640, HV = 360, GROUND = 260;
function resize(){
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const iw = Math.max(1, innerWidth), ih = Math.max(1, innerHeight);
  if (cv.width !== Math.floor(iw * dpr) || cv.height !== Math.floor(ih * dpr)){
    cv.width = Math.floor(iw * dpr);
    cv.height = Math.floor(ih * dpr);
    cv.style.width = iw + 'px';   // 화면 크기에 맞춤 (고해상도 폰 확대 방지)
    cv.style.height = ih + 'px';
  }
  scale = Math.min(cv.height / 360, cv.width / 500);
  W = cv.width / scale;
  HV = cv.height / scale;
  GROUND = HV * 0.72;
}
addEventListener('resize', resize);
addEventListener('orientationchange', () => setTimeout(resize, 200));
resize();

// ===== 얼굴 스프라이트 (누끼 + 흰 스티커 테두리) =====
let faceSprite = null, faceRatio = 0.9;
function headPath(g){
  // 부드러운 곡선 (중점 quadratic)
  g.beginPath();
  const P = HEAD_POLY, n = P.length;
  g.moveTo((P[0][0] + P[n-1][0]) / 2, (P[0][1] + P[n-1][1]) / 2);
  for (let i = 0; i < n; i++){
    const a = P[i], b = P[(i+1) % n];
    g.quadraticCurveTo(a[0], a[1], (a[0]+b[0])/2, (a[1]+b[1])/2);
  }
  g.closePath();
}
const faceImg = new Image();
faceImg.onload = () => {
  const xs = HEAD_POLY.map(p => p[0]), ys = HEAD_POLY.map(p => p[1]);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = Math.min(...ys), y1 = Math.max(...ys);
  const H = 220, sc = H / (y1 - y0), Wp = Math.ceil((x1 - x0) * sc);
  // 1) 누끼 (좌우반전: 달리는 방향을 보게)
  const cut = document.createElement('canvas');
  cut.width = Wp; cut.height = H;
  const cg = cut.getContext('2d');
  cg.setTransform(-sc, 0, 0, sc, x1 * sc, -y0 * sc);
  headPath(cg);
  cg.clip();
  cg.drawImage(faceImg, 0, 0);
  cg.setTransform(1, 0, 0, 1, 0, 0);
  // 2) 흰 실루엣
  const sil = document.createElement('canvas');
  sil.width = Wp; sil.height = H;
  const sg = sil.getContext('2d');
  sg.drawImage(cut, 0, 0);
  sg.globalCompositeOperation = 'source-in';
  sg.fillStyle = '#fff'; sg.fillRect(0, 0, Wp, H);
  // 3) 스티커 합성 (테두리 = 실루엣을 사방으로 찍기)
  const PAD = 12, R = 8;
  const S = document.createElement('canvas');
  S.width = Wp + PAD * 2; S.height = H + PAD * 2;
  const g = S.getContext('2d');
  for (let i = 0; i < 16; i++){
    const a = i / 16 * Math.PI * 2;
    g.drawImage(sil, PAD + Math.cos(a) * R, PAD + Math.sin(a) * R);
  }
  g.drawImage(cut, PAD, PAD);
  faceRatio = S.width / S.height;
  faceSprite = S;
};
faceImg.src = FACE_B64;

// ===== 오디오 (칩튠) =====
let AC = null, master = null, step = 0, nextT = 0;
let muted = localStorage.getItem('cgr_mute') === '1';
const NOTE = {C:-9, D:-7, E:-5, F:-4, G:-2, A:0, B:2};
function freq(n){
  if (!n) return 0;
  return 440 * Math.pow(2, (NOTE[n[0]] + (+n[1] - 4) * 12) / 12);
}
const MELODY = ['E5',0,'G5',0,'A5',0,'G5','E5','D5',0,'E5',0,'C5',0,0,0,
                'E5',0,'G5',0,'A5',0,'C6','A5','G5',0,'E5',0,'D5',0,'C5',0];
const BASS   = ['C3',0,0,0,'G2',0,0,0,'A2',0,0,0,'F2',0,0,0,
                'C3',0,0,0,'G2',0,0,0,'F2',0,0,0,'G2',0,0,0];
let noiseBuf = null;
function initAudio(){
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain();
  master.gain.value = muted ? 0 : 1;
  master.connect(AC.destination);
  noiseBuf = AC.createBuffer(1, AC.sampleRate * 0.5, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  nextT = AC.currentTime + 0.05;
  setInterval(schedule, 50);
}
function tone(type, f0, f1, t, dur, vol){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur + 0.02);
}
function hat(t, vol){
  const s = AC.createBufferSource(), g = AC.createGain(), f = AC.createBiquadFilter();
  s.buffer = noiseBuf;
  f.type = 'highpass'; f.frequency.value = 6000;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(t); s.stop(t + 0.06);
}
const STEP_LEN = 0.2; // 150bpm 8분음표
function schedule(){
  while (nextT < AC.currentTime + 0.15){
    if (state === 'play'){
      const m = MELODY[step % 32], b = BASS[step % 32];
      if (m) tone('square', freq(m), freq(m), nextT, 0.16, 0.05);
      if (b) tone('triangle', freq(b), freq(b), nextT, 0.3, 0.09);
      if (step % 2 === 0) hat(nextT, 0.02);
    }
    step++; nextT += STEP_LEN;
  }
}
function sfxJump(){ if (AC) tone('square', 320, 760, AC.currentTime, 0.13, 0.08); }
function sfxCrash(){
  if (!AC) return;
  const t = AC.currentTime;
  tone('sawtooth', 220, 50, t, 0.4, 0.12);
  const s = AC.createBufferSource(), g = AC.createGain();
  s.buffer = noiseBuf;
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  s.connect(g); g.connect(master); s.start(t); s.stop(t + 0.35);
}
function sfxPower(){
  // 무적 파워업 아르페지오
  if (!AC) return;
  const t = AC.currentTime;
  [523, 659, 784, 1047, 1319].forEach((f, i) => tone('square', f, f, t + i * 0.07, 0.12, 0.07));
}
function sfxDooDoong(){
  // 뚜~둥!! (팀파니 두 방 + 쿵 노이즈)
  if (!AC) return;
  const t = AC.currentTime;
  function boom(t0, f, d, v){
    tone('sine', f, f * 0.62, t0, d, v);
    const s = AC.createBufferSource(), g = AC.createGain(), fl = AC.createBiquadFilter();
    s.buffer = noiseBuf;
    fl.type = 'lowpass'; fl.frequency.value = 220;
    g.gain.setValueAtTime(0.25, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.22);
    s.connect(fl); fl.connect(g); g.connect(master);
    s.start(t0); s.stop(t0 + 0.3);
  }
  boom(t, 105, 0.5, 0.32);
  boom(t + 0.42, 80, 0.9, 0.38);
  tone('triangle', 523, 523, t + 0.55, 0.5, 0.05);
  tone('triangle', 784, 784, t + 0.62, 0.6, 0.04);
}
function sfxDing(){

function spawn(){
  const r = rnd();
  let o;
  if (score > 100 && rnd() < 0.025 && inv <= 0){ // ⭐ 무적 별 (희귀)
    o = {type:'star', item: true, x: W + 60, w: 32, h: 34, alt: rnd() < 0.5 ? 4 : 74};
  } else if (rnd() < 0.12){ // 커피 아이템 (먹으면 보너스)
    o = {type:'coffee', item: true, x: W + 60, w: 30, h: 32, alt: rnd() < 0.5 ? 4 : 74};
  } else if (score > 150 && r < 0.14){
    o = {type:'birdHigh', x: W + 60, w: 52, h: 30, alt: 132, flap: rnd() * 7};
    if (!birdHintShown){ birdHintShown = true; birdHint = 3.5; }
  } else if (score > 80 && r < 0.26){
    o = {type:'poo', x: W + 60, w: 30, h: 26, alt: 0};
  } else if (score > 60 && r < 0.4){
    o = {type:'bird', x: W + 60, w: 52, h: 30, alt: 34, flap: rnd() * 7};
  } else if (r < 0.62){
    o = {type:'cone', x: W + 60, w: 30, h: 38, alt: 0};
  } else if (r < 0.86 || score < 100){
    o = {type:'box', x: W + 60, w: 42, h: 40, alt: 0};
  } else {
    o = {type:'box2', x: W + 60, w: 42, h: 72, alt: 0};
  }
  obstacles.push(o);
  nextSpawn = 300 + speed * 0.45 + rnd() * 320;
}

function collide(){
  // 플레이어 판정 상자 (많이 후하게 — 스치는 건 봐줌)
  const px1 = P.x - 10, px2 = P.x + 10;
  const py2 = GROUND + P.y, py1 = py2 - 78;
  for (const o of obstacles){
    if (o.fly) continue; // 이미 날아가는 중
    const pad = o.item ? -8 : 8; // 아이템은 후하게 먹힘
    const ox1 = o.x - o.w/2 + pad, ox2 = o.x + o.w/2 - pad;
    const oy2 = GROUND - o.alt - 5, oy1 = oy2 - o.h + 10 - (o.item ? 14 : 0);
    if (px1 < ox2 && px2 > ox1 && py1 < oy2 && py2 > oy1){
      if (o.item){
        o.dead = true;
        if (o.type === 'star'){
          inv = 5;
          addFloat(P.x, GROUND - 130, '⭐ 무 적 !!', '#f39c12');
          say('무적이다!! 다 비켜!!!');
          sfxPower();
        } else {
          score += 20; dist += 200;
          addFloat(P.x, GROUND - 120, '카페인 충전⚡ +20', '#8d5a2b');
          sfxDing();
        }
        continue;
      }
      if (inv > 0){ // 무적: 대두 박치기로 날려버림
        o.fly = {vx: 350 + rnd() * 150, vy: -(450 + rnd() * 250), vr: 8 + rnd() * 10, y: 0, rot: 0};
        score += 5;
        addFloat(o.x, GROUND - o.alt - o.h - 22, '뿌셔!! +5', '#9b59b6');
        if (AC) tone('square', 200, 60, AC.currentTime, 0.15, 0.1);
        if (navigator.vibrate) navigator.vibrate(30);
        continue;
      }
      return o;
    }
    // 아슬아슬 보너스: 장애물 위를 간발의 차로 통과
    if (!o.item && !o.near && P.air && o.alt < 60 && Math.abs(o.x - P.x) < 8){
      const clearance = -P.y - (o.alt + o.h);
      if (clearance > 0 && clearance < 30){
        o.near = true;
        score += 10;
        addFloat(P.x, GROUND - 130, '아슬아슬! +10', '#e74c3c');
        sfxDing();
        if (rnd() < 0.5) say(rnd() < 0.5 ? '휴 살았다;;' : '방금 스쳤어!!');
      }
    }
  }
  return null;
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function hash(n){ n = (n * 2654435761) % 4294967296; return (n >>> 8) % 1000 / 1000; }

function drawBG(t){
  // 하늘
  const g = ctx.createLinearGradient(0, 0, 0, GROUND);
  g.addColorStop(0, '#6bbdf0');
  g.addColorStop(0.7, '#aadcf7');
  g.addColorStop(1, '#e8f6fd');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND);
  // 해
  ctx.fillStyle = '#ffe07a';
  ctx.beginPath(); ctx.arc(W * 0.82, GROUND * 0.2, 30, 0, 7); ctx.fill();
  // 구름
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  for (let i = 0; i < 6; i++){
    const cw = 90 + hash(i * 7 + 3) * 80;
    const cx = ((hash(i * 13 + 1) * (W + 400) - dist * 0.12 - i * 160) % (W + 300) + W + 300) % (W + 300) - 150;
    const cy = GROUND * (0.08 + hash(i * 3 + 2) * 0.35);
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw * 0.5, 16, 0, 0, 7);
    ctx.ellipse(cx - cw * 0.2, cy - 10, cw * 0.28, 13, 0, 0, 7);
    ctx.ellipse(cx + cw * 0.22, cy - 8, cw * 0.24, 11, 0, 0, 7);
    ctx.fill();
  }
  // 먼 빌딩
  drawBuildings(dist * 0.25, 0.55, '#b8cfe0', GROUND);
  // 가까운 빌딩
  drawBuildings(dist * 0.5 + 5000, 0.8, '#8fa9bf', GROUND);
  // 인도
  ctx.fillStyle = '#cfd4d8';
  ctx.fillRect(0, GROUND, W, HV - GROUND);
  ctx.fillStyle = '#b9bfc4';
  ctx.fillRect(0, GROUND, W, 5);
  // 보도블록 선
  ctx.strokeStyle = '#b3b9be'; ctx.lineWidth = 2;
  const off = dist % 95;
  for (let x = -off; x < W; x += 95){
    ctx.beginPath(); ctx.moveTo(x, GROUND + 5); ctx.lineTo(x - 14, HV); ctx.stroke();
  }
  // 차도
  const roadY = GROUND + (HV - GROUND) * 0.62;
  if (HV - GROUND > 70){
    ctx.fillStyle = '#5a6068';
    ctx.fillRect(0, roadY, W, HV - roadY);
    ctx.fillStyle = '#e8c33f';
    const off2 = dist * 1.3 % 120;
    for (let x = -off2; x < W; x += 120) ctx.fillRect(x, roadY + 18, 55, 6);
  }
}
function drawBuildings(scroll, hFactor, color, groundY){
  ctx.fillStyle = color;
  const seg = 110;
  const base = Math.floor(scroll / seg);
  for (let i = -1; i < W / seg + 2; i++){
    const idx = base + i;
    const bh = (0.25 + hash(idx * 17 + 5) * 0.55) * groundY * hFactor;
    const bw = seg - 12 - hash(idx * 29 + 11) * 30;
    const x = i * seg - (scroll % seg);
    ctx.fillRect(x, groundY - bh, bw, bh);
    // 창문
    ctx.fillStyle = 'rgba(255,244,180,.5)';
    for (let wy = groundY - bh + 12; wy < groundY - 14; wy += 22)
      for (let wx = x + 8; wx < x + bw - 10; wx += 20)
        if (hash((idx * 999 + wx * 7 + wy * 13) | 0) > 0.45) ctx.fillRect(wx, wy, 9, 11);
    ctx.fillStyle = color;
  }
}

function drawPlayer(t){
  const y = GROUND + P.y; // 발 위치
  const run = P.air ? 0 : Math.sin(dist * 0.09);
  const run2 = P.air ? 0 : Math.sin(dist * 0.09 + Math.PI);
  const bob = P.air ? 0 : Math.abs(Math.sin(dist * 0.09)) * 3;
  ctx.save();
  ctx.translate(P.x, y - bob);
  // 그림자
  ctx.restore();
  ctx.fillStyle = 'rgba(0,0,0,.18)';
  ctx.beginPath();
  ctx.ellipse(P.x, GROUND + 4, 26 - Math.min(20, -P.y * 0.1), 6, 0, 0, 7);
  ctx.fill();
  ctx.save();
  ctx.translate(P.x, y - bob);
  ctx.lineCap = 'round';
  // 다리
  ctx.strokeStyle = '#3d4b5c'; ctx.lineWidth = 9;
  if (P.air){
    ctx.beginPath(); ctx.moveTo(-2, -26); ctx.lineTo(-14, -12); ctx.lineTo(-4, -4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, -26); ctx.lineTo(14, -14); ctx.lineTo(6, -6); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(0, -26); ctx.lineTo(run * 15, -13); ctx.lineTo(run * 15 + 4, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -26); ctx.lineTo(run2 * 15, -13); ctx.lineTo(run2 * 15 + 4, 0); ctx.stroke();
  }
  // 신발
  ctx.fillStyle = '#e74c3c';
  if (P.air){
    ctx.beginPath(); ctx.ellipse(-4, -4, 8, 5, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6, -6, 8, 5, 0, 0, 7); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(run * 15 + 6, -2, 8, 5, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(run2 * 15 + 6, -2, 8, 5, 0, 0, 7); ctx.fill();
  }
  // 몸통(흰 티셔츠)
  ctx.fillStyle = '#f5f5f5';
  roundRect(-15, -54, 30, 30, 8); ctx.fill();
  ctx.strokeStyle = '#26303a'; ctx.lineWidth = 2.5;
  roundRect(-15, -54, 30, 30, 8); ctx.stroke();
  // 팔
  ctx.strokeStyle = '#f0c8a0'; ctx.lineWidth = 8;
  if (P.air){
    ctx.beginPath(); ctx.moveTo(-11, -48); ctx.lineTo(-22, -62); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11, -48); ctx.lineTo(24, -60); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-11, -48); ctx.lineTo(-11 + run2 * 13, -36); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11, -48); ctx.lineTo(11 + run * 13, -36); ctx.stroke();
  }
  // 가방
  ctx.fillStyle = '#8d6748';
  roundRect(-24, -52, 10, 20, 4); ctx.fill();
  // 머리 (얼굴 스티커!) — 무적이면 개커진 대두
  const hh = 62 * headScale, hw = hh * faceRatio;
  const headY = -54 - 24 - (hh - 62) / 2 + (P.air ? -2 : Math.sin(dist * 0.09) * 1.5);
  const rot = (P.air ? -0.12 : Math.sin(dist * 0.045) * 0.06) + (inv > 0 ? Math.sin(t * 18) * 0.07 : 0);
  ctx.save();
  ctx.translate(2, headY);
  ctx.rotate(rot);
  if (inv > 0 && (inv > 1.5 || Math.sin(t * 16) > -0.2)){
    // 무적 후광 (끝나기 직전엔 깜빡임)
    const gr = ctx.createRadialGradient(0, 0, hh * 0.3, 0, 0, hh * 0.75);
    gr.addColorStop(0, 'rgba(255,215,60,.75)');
    gr.addColorStop(1, 'rgba(255,215,60,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(0, 0, hh * 0.75, 0, 7); ctx.fill();
  }
  if (faceSprite){
    ctx.drawImage(faceSprite, -hw / 2, -hh / 2, hw, hh);
  } else { // 사진 로딩 전 대체 얼굴
    ctx.fillStyle = '#ffd54f';
    ctx.beginPath(); ctx.arc(0, 0, 25, 0, 7); ctx.fill();
  }
  ctx.restore();
  ctx.restore();
}

function drawObstacle(o, t){
  const gy = GROUND - o.alt;
  ctx.save();
  ctx.translate(o.x, gy);
  if (o.fly){ ctx.translate(0, o.fly.y); ctx.rotate(o.fly.rot); }
  if (o.type === 'star'){
    const bob = Math.sin(t * 5 + o.x * 0.01) * 5;
    const tw = 1 + Math.sin(t * 9) * 0.15;
    ctx.save();
    ctx.translate(0, -16 + bob);
    ctx.scale(tw, tw);
    ctx.font = '32px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('⭐', 0, 11);
    ctx.restore();
    ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#e67e22'; ctx.textAlign = 'center';
    ctx.fillText('무적!', 0, -40 + bob);
  } else if (o.type === 'coffee'){
    const bob = Math.sin(t * 5 + o.x * 0.01) * 4;
    ctx.font = '30px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('☕', 0, -4 + bob);
    ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#8d5a2b';
    ctx.fillText('+20', 0, -34 + bob);
  } else if (o.type === 'poo'){
    ctx.fillStyle = 'rgba(0,0,0,.12)';
    ctx.beginPath(); ctx.ellipse(0, 1, 15, 4, 0, 0, 7); ctx.fill();
    ctx.font = '28px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('💩', 0, -2);
    // 김 모락모락
    ctx.strokeStyle = 'rgba(120,90,60,.5)'; ctx.lineWidth = 1.5;
    for (const dx of [-7, 3]){
      const ph = t * 3 + dx;
      ctx.beginPath();
      ctx.moveTo(dx, -26);
      ctx.quadraticCurveTo(dx + Math.sin(ph) * 4, -33, dx, -40);
      ctx.stroke();
    }
  } else if (o.type === 'cone'){
    ctx.fillStyle = 'rgba(0,0,0,.15)';
    ctx.beginPath(); ctx.ellipse(0, 2, 18, 5, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#f2711c';
    ctx.beginPath(); ctx.moveTo(-4, -38); ctx.lineTo(4, -38); ctx.lineTo(13, 0); ctx.lineTo(-13, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(-7, -24); ctx.lineTo(7, -24); ctx.lineTo(9, -15); ctx.lineTo(-9, -15); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#d35400';
    ctx.fillRect(-16, -3, 32, 4);
  } else if (o.type === 'box' || o.type === 'box2'){
    const n = o.type === 'box2' ? 2 : 1;
    for (let i = 0; i < n; i++){
      const by = -i * 36 - (i > 0 ? 2 : 0);
      ctx.fillStyle = i === 0 ? '#c89b6d' : '#d9ae7e';
      roundRect(-20 + i * 2, by - 38, 40 - i * 4, 38, 3); ctx.fill();
      ctx.strokeStyle = '#9a7350'; ctx.lineWidth = 2;
      roundRect(-20 + i * 2, by - 38, 40 - i * 4, 38, 3); ctx.stroke();
      ctx.fillStyle = '#e8d5a0';
      ctx.fillRect(-4, by - 38, 8, 38);
      ctx.fillStyle = '#7a5a3a';
      ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('택배', -9 + i * 2, by - 16);
    }
  } else { // bird / birdHigh
    const flap = Math.sin(t * 16 + o.flap);
    ctx.fillStyle = 'rgba(0,0,0,.1)';
    ctx.beginPath(); ctx.ellipse(0, o.alt - 2, 16, 4, 0, 0, 7); ctx.fill();
    ctx.translate(0, -o.h / 2 - 2 + Math.sin(t * 4 + o.flap) * 3);
    // 몸
    ctx.fillStyle = '#9aa5b1';
    ctx.beginPath(); ctx.ellipse(0, 0, 17, 11, 0, 0, 7); ctx.fill();
    // 머리
    ctx.fillStyle = '#7d8894';
    ctx.beginPath(); ctx.arc(-15, -6, 8, 0, 7); ctx.fill();
    // 부리
    ctx.fillStyle = '#f2a33c';
    ctx.beginPath(); ctx.moveTo(-22, -6); ctx.lineTo(-29, -4); ctx.lineTo(-22, -2); ctx.closePath(); ctx.fill();
    // 눈
    ctx.fillStyle = '#26303a';
    ctx.beginPath(); ctx.arc(-17, -8, 1.8, 0, 7); ctx.fill();
    // 날개
    ctx.fillStyle = '#b7c0ca';
    ctx.beginPath();
    ctx.moveTo(2, -2);
    ctx.quadraticCurveTo(14, -2 - flap * 22, 24, -4 - flap * 26);
    ctx.quadraticCurveTo(12, 4 - flap * 8, 2, 4);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawUI(t){
  ctx.textAlign = 'left';
  ctx.fillStyle = '#26303a';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('점수 ' + score, 18, 38);
  ctx.font = '15px sans-serif';
  ctx.fillStyle = '#4a5866';
  ctx.fillText('최고 ' + hi, 18, 60);
  // 음소거 버튼
  ctx.font = '26px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(muted ? '🔇' : '🔊', W - 42, 49);
  // 무적 게이지
  if (inv > 0){
    const gw = 150, gx = W / 2 - gw / 2, gy2 = 30;
    ctx.fillStyle = 'rgba(255,255,255,.8)';
    roundRect(gx - 4, gy2 - 4, gw + 8, 18, 8); ctx.fill();
    ctx.fillStyle = '#f39c12';
    roundRect(gx, gy2, Math.max(6, gw * inv / 5), 10, 5); ctx.fill();
    ctx.fillStyle = '#b7791f';
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText('⭐ 무 적 ⭐', W / 2, gy2 + 26);
  }
  if (mileFlash > 0){
    ctx.fillStyle = 'rgba(38,48,58,' + Math.min(1, mileFlash) + ')';
    ctx.font = 'bold 25px sans-serif';
    ctx.fillText(mileMsg, W / 2, GROUND * 0.35);
  }
  if (birdHint > 0){
    ctx.fillStyle = 'rgba(200,60,60,' + Math.min(1, birdHint) + ')';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('⚠️ 높이 나는 비둘기는 점프 금지!', W / 2, GROUND * 0.25);
  }
  // 떠오르는 보너스 텍스트
  for (const f of floats){
    ctx.globalAlpha = 1 - f.t / 1.2;
    ctx.fillStyle = f.color;
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText(f.txt, f.x, f.y - f.t * 45);
    ctx.globalAlpha = 1;
  }
  // 혼잣말 말풍선
  if (bubbleT > 0 && bubble && state === 'play'){
    const bx = P.x + 20, by = GROUND + P.y - 132;
    ctx.font = 'bold 15px sans-serif';
    const tw = ctx.measureText(bubble).width;
    ctx.fillStyle = 'rgba(255,255,255,.95)';
    ctx.strokeStyle = '#26303a'; ctx.lineWidth = 2;
    roundRect(bx - 8, by - 22, tw + 16, 30, 10);
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); // 꼬리
    ctx.moveTo(bx + 2, by + 8); ctx.lineTo(bx - 6, by + 20); ctx.lineTo(bx + 14, by + 8);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,.95)'; ctx.fill();
    ctx.fillStyle = '#26303a'; ctx.textAlign = 'left';
    ctx.fillText(bubble, bx, by);
    ctx.textAlign = 'center';
  }
  // 부장님 전화 배너
  if (phoneT > 0){
    const shake = Math.sin(phoneT * 40) * 3;
    const bw = Math.min(W - 40, 330);
    ctx.save();
    ctx.translate(W / 2 + shake, 86);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 3;
    roundRect(-bw / 2, -24, bw, 52, 12); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#26303a'; ctx.font = 'bold 17px sans-serif';
    ctx.fillText('📳 웅기 전화옴!!!', 0, -2);
    ctx.fillStyle = '#e74c3c'; ctx.font = '13px sans-serif';
    ctx.fillText('(지금 받으면 죽습니다. 달리세요)', 0, 18);
    ctx.restore();
  }
}

function drawTitle(t){
  ctx.save();
  // 뚜둥 화면 흔들림
  if (introOn){
    const sh = 9 * Math.exp(-introT * 4);
    ctx.translate(Math.sin(introT * 55) * sh, Math.cos(introT * 47) * sh);
  }
  ctx.textAlign = 'center';
  // 제목 등장: 위에서 쿵 떨어지며 튕김
  const pop = Math.min(1, titleT / 0.7);
  const back = 1 + 2.7 * Math.pow(pop - 1, 3) + 1.7 * Math.pow(pop - 1, 2); // easeOutBack
  let sc = 0.2 + 0.8 * back;
  if (introOn) sc *= 1 + 0.3 * Math.exp(-introT * 4) * Math.cos(introT * 26); // 뚜둥 펄스
  ctx.save();
  ctx.translate(W / 2, GROUND * 0.3);
  ctx.scale(sc, sc);
  ctx.font = 'bold 47px sans-serif';
  ctx.lineWidth = 10; ctx.strokeStyle = '#fff'; ctx.lineJoin = 'round';
  ctx.strokeText('문성훈의 출근길', 0, 0);
  ctx.fillStyle = '#1d2b3a';
  ctx.fillText('문성훈의 출근길', 0, 0);
  ctx.restore();
  // 통통 튀는 얼굴
  const fh = 116, fw = fh * faceRatio;
  const by = GROUND * 0.55 + Math.abs(Math.sin(t * 3.2)) * -26;
  if (faceSprite) ctx.drawImage(faceSprite, W / 2 - fw / 2, by - fh / 2, fw, fh);
  if (introOn){
    // 뚜둥~!! 커지며 사라지는 글자
    const k = Math.min(1, introT / 0.9);
    ctx.save();
    ctx.globalAlpha = 1 - k * k;
    ctx.translate(W / 2, GROUND * 0.44);
    ctx.rotate(-0.08);
    ctx.scale(1 + k * 1.1, 1 + k * 1.1);
    ctx.font = 'bold 40px sans-serif';
    ctx.lineWidth = 8; ctx.strokeStyle = '#fff';
    ctx.strokeText('뚜 둥 ~ !!', 0, 0);
    ctx.fillStyle = '#e74c3c';
    ctx.fillText('뚜 둥 ~ !!', 0, 0);
    ctx.restore();
  } else {
    ctx.font = '19px sans-serif';
    ctx.fillStyle = '#3a4a5a';
    ctx.fillText('장애물이 나오면 화면을 터치! 점프!', W / 2, GROUND * 0.8);
    if (Math.sin(t * 4) > -0.3){
      ctx.font = 'bold 24px sans-serif';
      ctx.fillStyle = '#e74c3c';
      ctx.fillText('▶ 터치해서 출근 시작', W / 2, GROUND * 0.93);
    }
    if (hi > 0){
      ctx.font = '15px sans-serif';
      ctx.fillStyle = '#4a5866';
      ctx.fillText('최고 기록: ' + hi, W / 2, GROUND * 1.03);
    }
  }
  ctx.restore();
}

function drawDead(t){
  ctx.fillStyle = 'rgba(30,38,48,.45)';
  ctx.fillRect(0, 0, W, HV);
  const cy = HV * 0.42;
  ctx.fillStyle = '#fff';
  roundRect(W / 2 - 170, cy - 105, 340, 210, 18);
  ctx.fill();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 34px sans-serif';
  ctx.fillText('꽝! 지각이다!!', W / 2, cy - 58);
  ctx.fillStyle = '#8a97a5';
  ctx.font = '13px sans-serif';
  ctx.fillText('─── 지 각 사 유 서 ───', W / 2, cy - 34);
  ctx.fillStyle = '#4a5866';
  ctx.font = '16px sans-serif';
  ctx.fillText('사유: ' + deadMsg, W / 2, cy - 12);
  ctx.fillStyle = '#26303a';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText('점수 ' + score, W / 2, cy + 16);
  ctx.font = '16px sans-serif';
  ctx.fillStyle = score >= hi && score > 0 ? '#e67e22' : '#4a5866';
  ctx.fillText(score >= hi && score > 0 ? '🏆 신기록!!' : '최고 기록 ' + hi, W / 2, cy + 44);
  if (deadTimer > 0.7 && Math.sin(t * 4) > -0.3){
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('▶ 터치해서 다시 출근', W / 2, cy + 82);
  }
}

// ===== 메인 루프 =====
let last = 0;
function loop(ms){
  const t = ms / 1000;
  const dt = Math.min(0.033, t - last || 0.016);
  last = t;
  resize(); // 크기 변화 감지(변화 없으면 통과)

  if (state === 'title'){
    titleT += dt;
    if (introOn){
      introT += dt;
      if (introT > 1.35){ state = 'play'; reset(); }
    }
  }
  if (state === 'play'){
    speed = 280 + Math.min(360, score * 0.2); // 아주 완만하게 상승 (1800점에 최고속도, 최고치도 하향)
    dist += speed * dt;
    score = Math.floor(dist / 10);
    if (score - lastMile >= 100){
      mileMsg = MILES[Math.min(MILES.length - 1, lastMile / 100)];
      lastMile += 100; mileFlash = 2; sfxDing();
    }
    mileFlash -= dt; birdHint -= dt;
    // 혼잣말 말풍선
    bubbleT -= dt; nextBubble -= dt;
    if (nextBubble <= 0){
      say(TALKS[Math.floor(rnd() * TALKS.length)]);
      nextBubble = 4.5 + rnd() * 4;
    }
    // 부장님 전화 이벤트
    phoneT -= dt;
    for (const ps of [230, 550, 900]){
      if (score >= ps && !phoneDone[ps]){
        phoneDone[ps] = true; phoneT = 3.2;
        if (navigator.vibrate) navigator.vibrate([80, 60, 80, 60, 80]);
        if (AC){ const t0 = AC.currentTime;
          tone('square', 880, 880, t0, 0.1, 0.06); tone('square', 880, 880, t0 + 0.15, 0.1, 0.06);
          tone('square', 880, 880, t0 + 0.5, 0.1, 0.06); tone('square', 880, 880, t0 + 0.65, 0.1, 0.06); }
        say('웅기 ㄱㅅㄲ..');
      }
    }
    // 떠오르는 텍스트
    for (const f of floats) f.t += dt;
    floats = floats.filter(f => f.t < 1.2);
    // 점프 물리
    jumpBuf -= dt;
    if (P.air){
      P.vy += GRAV * dt;
      P.y += P.vy * dt;
      if (P.y >= 0){
        P.y = 0; P.vy = 0; P.air = false;
        if (jumpBuf > 0){ jumpBuf = 0; jump(); } // 미리 눌러둔 점프 실행
      }
    }
    // 무적 타이머 + 대두 크기
    const wasInv = inv > 0;
    inv -= dt;
    if (wasInv && inv <= 0) nextSpawn = Math.max(nextSpawn, speed * 1.3); // 무적 끝나면 잠시 안전시간
    const hs = inv > 0 ? 2.3 : 1;
    headScale += (hs - headScale) * Math.min(1, dt * 7);
    // 장애물 (무적 끝나기 직전엔 새 장애물 안 냄 — 끝나자마자 부딪히는 것 방지)
    nextSpawn -= speed * dt;
    if (nextSpawn <= 0 && !(inv > 0 && inv < 1.4)) spawn();
    for (const o of obstacles){
      o.x -= speed * dt;
      if (o.fly){ // 대두 박치기로 날아가는 중
        o.x += o.fly.vx * dt;
        o.fly.vy += 1500 * dt;
        o.fly.y += o.fly.vy * dt;
        o.fly.rot += o.fly.vr * dt;
      }
    }
    obstacles = obstacles.filter(o => o.x > -80 && o.x < W + 300 && !o.dead && !(o.fly && o.fly.y > 400));
    const hitObj = collide();
    if (hitObj) die(hitObj);
  } else if (state === 'dead'){
    deadTimer += dt;
    if (head){
      head.vy += GRAV * dt;
      head.x += head.vx * dt;
      head.y += head.vy * dt;
      head.rot += head.vr * dt;
      head.vx *= 0.995;
      if (head.y > GROUND - 30){
        head.y = GROUND - 30;
        head.vy = -head.vy * 0.55;
        head.vr *= 0.8;
        if (Math.abs(head.vy) < 60) head.vy = 0;
      }
    }
  }

  // 그리기
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
  drawBG(t);
  for (const o of obstacles) drawObstacle(o, t);
  if (state === 'dead') drawDeadPlayer();
  else drawPlayer(t);
  if (state === 'title') drawTitle(t);
  else drawUI(t);
  if (state === 'dead') drawDead(t);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
